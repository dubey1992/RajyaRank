name: CI

# Runs on every pull request and every push — this is the automated "does
# this actually work" check before anything reaches staging or production.

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies (locked)
        run: pnpm install --frozen-lockfile

      # apps/api and apps/worker import @prisma/client's generated types —
      # must exist before typecheck/build/test or they fall back to `any`.
      - name: Generate Prisma client
        run: pnpm --filter @rajyarank/api exec prisma generate

      - name: Check for accidentally committed secret files
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.[a-z]+$|apps/.*/\.env$' | grep -v '\.example$'; then
            echo "::error::A real .env file is tracked by git. Stop and remove it before merging."
            exit 1
          fi
          echo "No tracked .env files found."

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
