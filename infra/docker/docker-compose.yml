# Local development services for RajyaRank.
# Usage: docker compose -f infra/docker/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: rajyarank-postgres
    environment:
      POSTGRES_USER: rajyarank
      POSTGRES_PASSWORD: rajyarank
      POSTGRES_DB: rajyarank
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rajyarank -d rajyarank']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rajyarank-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rajyarank-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: rajyarank-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '1025']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  miniodata:
