# Ephemeral services for CI integration/e2e tests (no persistent volumes).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rajyarank
      POSTGRES_PASSWORD: rajyarank
      POSTGRES_DB: rajyarank_test
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rajyarank -d rajyarank_test']
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 20
